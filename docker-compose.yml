services:

  pythia-llm:
    image: ghcr.io/nvidia-ai-iot/vllm:latest-jetson-orin
    container_name: pythia-llm
    runtime: nvidia
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: vllm serve ${LLM_MODEL} --dtype half --max-model-len 2048 --gpu-memory-utilization 0.6
    ports:
      - "8080:8000"
    volumes:
      # Named volume — model weights persist across container restarts
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  pythia-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pythia-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # sources.yaml is read at runtime — mount read-only
      - ./sources.yaml:/app/sources.yaml:ro
    ports:
      - "${BACKEND_PORT:-8082}:8000"
    depends_on:
      pythia-llm:
        condition: service_healthy
    # Conservative memory ceiling for Jetson Orin Nano Super
    # Adjust upward if you have RAM to spare
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  pythia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Language is baked into the JS bundle at build time
        VITE_LANGUAGE: ${PYTHIA_LANGUAGE:-en}
    container_name: pythia-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      pythia-backend:
        condition: service_healthy
    mem_limit: 64m
    memswap_limit: 64m

volumes:
  hf-cache:
