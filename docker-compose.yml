services:

  pythia-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pythia-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      # sources.yaml is read at runtime — mount read-only
      - ./sources.yaml:/app/sources.yaml:ro
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  pythia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Language is baked into the JS bundle at build time
        VITE_LANGUAGE: ${PYTHIA_LANGUAGE:-en}
    container_name: pythia-frontend
    restart: unless-stopped
    networks:
      - default
      - proxy-network
    depends_on:
      pythia-backend:
        condition: service_healthy
    mem_limit: 64m
    memswap_limit: 64m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pythia.rule=Host(`pythia.h.reho.dev`)"
      - "traefik.http.routers.pythia.entrypoints=websecure"
      - "traefik.http.routers.pythia.tls.certresolver=letsencrypt"
      - "traefik.http.services.pythia.loadbalancer.server.port=80"

networks:
  proxy-network:
    external: true
